name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  NODE_VERSION: '22'
  MONGODB_VERSION: '6.0'
  NATS_VERSION: '2.9'
  REDIS_VERSION: '7'

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Snyk security scan
        continue-on-error: true
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3

      - name: npm audit (root workspace)
        run: npm audit --audit-level=high

      - name: npm audit (backend)
        run: cd backend && npm audit --audit-level=high

      - name: npm audit (frontend)
        run: cd frontend && npm audit --audit-level=high

  openapi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Validate OpenAPI spec
        run: npx --yes @redocly/cli@1 lint docs/api-spec.yaml

  lint:
    runs-on: ubuntu-latest
    needs: [openapi]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prettier
        run: npm run format:check

      - name: ESLint (workspaces)
        run: npm run lint --workspaces --if-present

  backend-tests:
    runs-on: ubuntu-latest
    needs: [lint]
    services:
      mongodb:
        image: mongo:${{ env.MONGODB_VERSION }}
        env:
          MONGO_INITDB_ROOT_USERNAME: admin
          MONGO_INITDB_ROOT_PASSWORD: password123
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      nats:
        image: nats:${{ env.NATS_VERSION }}-alpine
        ports:
          - 4222:4222
          - 8222:8222
        options: --jetstream --http_port 8222

      redis:
        image: redis:${{ env.REDIS_VERSION }}-alpine
        ports:
          - 6379:6379
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Wait for services
        run: |
          until mongosh --host localhost:27017 --username admin --password password123 --authenticationDatabase admin --eval "db.adminCommand('ping')" > /dev/null 2>&1; do sleep 1; done
          until wget --no-verbose --tries=1 --spider http://localhost:8222/healthz > /dev/null 2>&1; do sleep 1; done
          until redis-cli -h localhost:6379 ping > /dev/null 2>&1; do sleep 1; done

      - name: Build backend
        run: npm run build -w accountability-backend

      - name: Run backend tests
        run: npm test -w accountability-backend
        env:
          MONGODB_URI: mongodb://admin:password123@localhost:27017/accountability-test?authSource=admin
          JWT_SECRET: testsecret
          NATS_URL: nats://localhost:4222
          REDIS_URL: redis://localhost:6379

      - name: Run backend benchmarks
        run: npm run bench -w accountability-backend
        env:
          MONGODB_URI: mongodb://admin:password123@localhost:27017/accountability-test?authSource=admin
          NATS_URL: nats://localhost:4222
          REDIS_URL: redis://localhost:6379

      - name: Run MongoDB index analysis
        run: npm run bench:mongo -w accountability-backend
        env:
          MONGODB_URI: mongodb://admin:password123@localhost:27017/accountability-test?authSource=admin
          NATS_URL: nats://localhost:4222
          REDIS_URL: redis://localhost:6379

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: |
            backend/bench/performance-report.json
            backend/bench/mongo-index-analysis.json
            backend/bench/mongo-index-summary.md
          if-no-files-found: ignore

  frontend-tests:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck frontend
        run: npm run typecheck -w accountability-frontend

      - name: Run frontend tests
        run: npm run test -w accountability-frontend

      - name: Run frontend benchmarks
        run: npm run bench -w accountability-frontend

      - name: Build frontend
        run: npm run build -w accountability-frontend

      - name: Run Lighthouse
        run: npm run lighthouse -w accountability-frontend

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-results
          path: |
            frontend/bench/ui-performance-report.json
            frontend/bench/lighthouse-report.json
          if-no-files-found: ignore

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/

  e2e-tests:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    services:
      mongodb:
        image: mongo:${{ env.MONGODB_VERSION }}
        env:
          MONGO_INITDB_ROOT_USERNAME: admin
          MONGO_INITDB_ROOT_PASSWORD: password123
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      nats:
        image: nats:${{ env.NATS_VERSION }}-alpine
        ports:
          - 4222:4222
          - 8222:8222
        options: --jetstream --http_port 8222

      redis:
        image: redis:${{ env.REDIS_VERSION }}-alpine
        ports:
          - 6379:6379
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Wait for MongoDB, NATS, Redis
        run: |
          until mongosh --host localhost:27017 --username admin --password password123 --authenticationDatabase admin --eval "db.adminCommand('ping')" > /dev/null 2>&1; do sleep 1; done
          until wget --no-verbose --tries=1 --spider http://localhost:8222/healthz > /dev/null 2>&1; do sleep 1; done
          until redis-cli -h localhost:6379 ping > /dev/null 2>&1; do sleep 1; done

      - name: Build backend
        run: npm run build -w accountability-backend

      - name: Start backend
        env:
          MONGODB_URI: mongodb://admin:password123@localhost:27017/accountability-test?authSource=admin
          NATS_URL: nats://localhost:4222
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: testsecret
          PORT: 5000
        run: |
          node backend/dist/app.js &
          for i in $(seq 1 30); do curl -sf http://127.0.0.1:5000/healthz && break || sleep 1; done

      - name: Start frontend (Vite)
        run: |
          npm run dev -w accountability-frontend &
          for i in $(seq 1 45); do curl -sf http://127.0.0.1:3000/ && break || sleep 1; done

      - name: Run Cypress
        run: npm run cypress:run -w accountability-frontend

  performance:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    services:
      mongodb:
        image: mongo:${{ env.MONGODB_VERSION }}
        env:
          MONGO_INITDB_ROOT_USERNAME: admin
          MONGO_INITDB_ROOT_PASSWORD: password123
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      nats:
        image: nats:${{ env.NATS_VERSION }}-alpine
        ports:
          - 4222:4222
          - 8222:8222
        options: --jetstream --http_port 8222

      redis:
        image: redis:${{ env.REDIS_VERSION }}-alpine
        ports:
          - 6379:6379
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Install dependencies
        run: npm ci

      - name: Wait for services
        run: |
          until mongosh --host localhost:27017 --username admin --password password123 --authenticationDatabase admin --eval "db.adminCommand('ping')" > /dev/null 2>&1; do sleep 1; done
          until wget --no-verbose --tries=1 --spider http://localhost:8222/healthz > /dev/null 2>&1; do sleep 1; done
          until redis-cli -h localhost:6379 ping > /dev/null 2>&1; do sleep 1; done

      - name: Build and start backend
        env:
          MONGODB_URI: mongodb://admin:password123@localhost:27017/accountability-perf?authSource=admin
          NATS_URL: nats://localhost:4222
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: perfsecret
          PORT: 5000
        run: |
          npm run build -w accountability-backend
          node backend/dist/app.js &
          for i in $(seq 1 30); do curl -sf http://127.0.0.1:5000/healthz && break || sleep 1; done

      - name: Bench workspace install
        run: npm ci --prefix bench

      - name: Quick health load test
        env:
          TARGET_URL: http://127.0.0.1:5000
        run: node bench/quick-health-bench.js

      - name: k6 smoke
        env:
          TARGET_URL: http://127.0.0.1:5000
        run: k6 run --summary-export=bench/k6-summary.json bench/load-test-k6.js

      - name: Generate performance report
        run: node bench/generate-performance-report.js

      - name: Upload performance results
        uses: actions/upload-artifact@v4
        with:
          name: performance-results
          path: |
            bench/load-test-results.json
            bench/performance-report.json
            bench/k6-summary.json

  compliance:
    runs-on: ubuntu-latest
    needs: [security, backend-tests, frontend-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download backend test results
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: backend-test-results
          path: ./

      - name: Generate SBOM
        run: |
          npm install -g @cyclonedx/cyclonedx-npm
          cd backend && cyclonedx-npm --output-file sbom-backend.xml
          cd ../frontend && cyclonedx-npm --output-file sbom-frontend.xml

      - name: License compliance
        run: |
          npm install -g license-checker
          ALLOW='MIT;Apache-2.0;BSD-2-Clause;BSD-3-Clause;ISC;MPL-2.0;CC0-1.0;Unlicense;Python-2.0;BlueOak-1.0.0'
          cd backend && license-checker --summary --onlyAllow "$ALLOW"
          cd ../frontend && license-checker --summary --onlyAllow "$ALLOW"

      - name: Upload compliance artifacts
        uses: actions/upload-artifact@v4
        with:
          name: compliance-artifacts
          path: |
            backend/sbom-backend.xml
            frontend/sbom-frontend.xml

  build:
    runs-on: ubuntu-latest
    needs: [compliance]
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/accountability-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/accountability-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/accountability-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/accountability-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.4.0'

      - name: Sign backend image
        continue-on-error: true
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
        run: |
          if [ -z "$COSIGN_PRIVATE_KEY" ]; then echo "Skipping cosign (no key)"; exit 0; fi
          cosign sign --yes --key env://COSIGN_PRIVATE_KEY "${{ secrets.DOCKER_USERNAME }}/accountability-backend:${{ github.sha }}"

      - name: Sign frontend image
        continue-on-error: true
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
        run: |
          if [ -z "$COSIGN_PRIVATE_KEY" ]; then echo "Skipping cosign (no key)"; exit 0; fi
          cosign sign --yes --key env://COSIGN_PRIVATE_KEY "${{ secrets.DOCKER_USERNAME }}/accountability-frontend:${{ github.sha }}"

  deploy-staging:
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/develop' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to staging
        run: echo "Deploying to staging (placeholder)"

  deploy-production:
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to production
        run: echo "Deploying to production (placeholder)"

  performance-report:
    runs-on: ubuntu-latest
    needs: [performance]
    if: always() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    steps:
      - uses: actions/checkout@v4

      - name: Download performance results
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: performance-results
          path: bench/

      - name: Generate performance summary
        run: |
          echo "## Performance benchmark results" > performance-summary.md
          echo "" >> performance-summary.md
          if [ -f "bench/performance-report.json" ]; then
            echo "### Backend" >> performance-summary.md
            echo "- API p99 (ms): $(jq -r '.api.singleLog.latency.p99 // "n/a"' bench/performance-report.json)" >> performance-summary.md
          fi
          if [ -f "bench/ui-performance-report.json" ]; then
            echo "### Frontend" >> performance-summary.md
            echo "- TTI (ms): $(jq -r '.metrics.navigation.timeToInteractive // "n/a"' bench/ui-performance-report.json)" >> performance-summary.md
          fi

      - name: Upload performance summary
        uses: actions/upload-artifact@v4
        with:
          name: performance-summary
          path: performance-summary.md
